  /v1/clubs/{clubId}/plants:
    get:
      description: >-
        Retrieves all cannabis plants for a club with their cultivation
        information. Plants represent individual cannabis specimens being grown
        from seeds, cuttings, or clones. Includes plant details like name,
        cultivation status (seed, germination, vegetative, flowering, harvest,
        etc.), strain information, zone assignment, parent plant relationships,
        expected yield, harvest dates, growing substrate, fertilizer, and
        cultivation timeline. Supports filtering by date range, is_mother,
        status, archived status, inventory_item_id, batch_id, strain_id,
        room_id, and parent_id. Supports pagination with limit and offset
        parameters.
      operationId: getClubPlants
      parameters:
        - name: clubId
          required: true
          in: path
          schema:
            type: string
        - name: archived
          required: false
          in: query
          description: Filter by archived status
          schema:
            type: boolean
        - name: parent_id
          required: false
          in: query
          description: >-
            Filter by parent_id. Can be a single value or array of IDs (e.g.,
            'parent123' or ['parent123', 'parent456'])
          schema:
            type: array
            items:
              type: string
        - name: room_id
          required: false
          in: query
          description: >-
            Filter by room_id. Can be a single value or array of IDs (e.g.,
            'room123' or ['room123', 'room456'])
          schema:
            type: array
            items:
              type: string
        - name: strain_id
          required: false
          in: query
          description: >-
            Filter by strain_id. Can be a single value or array of IDs (e.g.,
            'strain123' or ['strain123', 'strain456'])
          schema:
            type: array
            items:
              type: string
        - name: batch_id
          required: false
          in: query
          description: >-
            Filter by batch_id. Can be a single value or array of IDs (e.g.,
            'batch123' or ['batch123', 'batch456'])
          schema:
            type: array
            items:
              type: string
        - name: inventory_item_id
          required: false
          in: query
          description: >-
            Filter by inventory_item_id. Can be a single value or array of IDs
            (e.g., 'item123' or ['item123', 'item456'])
          schema:
            type: array
            items:
              type: string
        - name: status
          required: false
          in: query
          description: >-
            Filter by cultivation status. Can be a single value or array of
            statuses (e.g., 'SEED' or ['SEED', 'VEGETATIVE'])
          schema:
            type: array
            items:
              type: string
              enum:
                - SEED
                - GERMINATION
                - CUTTING
                - VEGETATIVE
                - FLOWERING
                - HARVEST
                - CURING
                - DRYING
                - QUARANTINE
                - DESTROYED
        - name: is_mother
          required: false
          in: query
          description: Filter by is_mother status
          schema:
            type: boolean
        - name: created_at_end
          required: false
          in: query
          description: Filter by created_at <= created_at_end (ISO date string)
          schema:
            type: string
        - name: created_at_start
          required: false
          in: query
          description: Filter by created_at >= created_at_start (ISO date string)
          schema:
            type: string
        - name: offset
          required: false
          in: query
          description: Offset for pagination
          schema:
            type: number
        - name: limit
          required: false
          in: query
          description: Limit number of results
          schema:
            type: number
      responses:
        '200':
          description: ''
        4XX:
          description: >-
            400 (Bad Request - Check your payload), 401 (Unauthorized - Check
            your API key), 403 (Forbidden - Check your permissions), 404 (Not
            Found - Check the URL), 429 (Too Many Requests - Rate limit
            exceeded)
        5XX:
          description: >-
            Something went wrong on our end. Please try again later or contact
            support if the issue persists.
      summary: Get cannabis plants
      tags:
        - Grow
    post:
      description: >-
        Creates one or more cannabis plants for cultivation tracking. Supports
        bulk plant creation by specifying plant_count. Plants can be created
        from seeds, cuttings from mother plants, or as standalone specimens.
        Validates parent plant relationships, zone assignments, strain linkage,
        and batch associations.
      operationId: createClubPlants
      parameters:
        - name: clubId
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlantsRequest'
      responses:
        '201':
          description: ''
        4XX:
          description: >-
            400 (Bad Request - Check your payload), 401 (Unauthorized - Check
            your API key), 403 (Forbidden - Check your permissions), 404 (Not
            Found - Check the URL), 429 (Too Many Requests - Rate limit
            exceeded)
        5XX:
          description: >-
            Something went wrong on our end. Please try again later or contact
            support if the issue persists.
      summary: Create cannabis plants
      tags:
        - Grow
