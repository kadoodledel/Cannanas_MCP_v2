      description: >-
        Lightweight ping endpoint that returns a simple JSON response to verify
        API availability and basic connectivity. This endpoint is publicly
        accessible without authentication and has minimal overhead, making it
        ideal for monitoring tools, load balancers, and uptime checks. Unlike
        comprehensive health checks, this only verifies that the API server is
        running and can process basic HTTP requests. Always returns `{"pong":
