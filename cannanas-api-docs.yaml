info:
  title: Cannanas API Documentation
  description: >

    #### 🚀 Quick Start


    ##### 1. Get your API key


    * Open your **Cannanas profile** and navigate to the **[API
    Keys](https://app.cannanas.club/user/api-keys)** section.

    * Generate a personal API key and copy it.

    * Use the key in your request header:


    ```http

    Authorization: Bearer <YOUR_API_KEY>

    ```


    ##### 2. Test in Browser


    * Click the **Authorize** button below and paste your API key.

    * Validate your credentials using the **Authentication Test Endpoint**.

    * Click **Try it out** → **Execute**.

    * A successful response will look like this:


    ```json

    { "message": "Authentication successful" }

    ```


    ##### 3. Use cURL


    ```bash

    curl https://api.cannanas.club/v1/auth/test --header 'Authorization: Bearer
    <YOUR_API_KEY>'

    ```


    #### ✨ AI Support


    Use the [Cannanas OpenAPI Specification](/docs/cannanas-api-docs.yaml) to
    generate custom client libraries or provide instant context for your AI
    agents.
