components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    FileUpdateRequest:
      type: object
      properties:
        title:
          description: File title
          type: string
        description:
          description: File description
          type: string
        tags:
          description: File tags
          type: array
          items:
            type: string
            enum:
              - required-for-club-registration
              - club-member-file
              - club-charge-invoice
              - club-charge-invoice-cancellation
              - club-charge-tse-receipt
              - club-charge-tse-storno-receipt
      additionalProperties: false
    CreateAnalyisRequest:
      type: object
      properties:
        harvest_id:
          anyOf:
            - type: string
              format: uuid
              pattern: >-
                ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
            - type: 'null'
          description: Harvest ID
        plant_ids:
          anyOf:
            - type: array
              items:
                type: string
                format: uuid
                pattern: >-
                  ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
            - type: 'null'
          description: Plant IDs
        batch_ids:
          anyOf:
            - type: array
              items:
                type: string
                format: uuid
                pattern: >-
                  ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
            - type: 'null'
          description: Batch IDs
        inventory_item_ids:
          anyOf:
            - type: array
              items:
                type: string
            - type: 'null'
          description: Inventory item IDs
        strain_id:
          anyOf:
            - type: string
            - type: 'null'
          description: Strain ID
        notes:
          anyOf:
