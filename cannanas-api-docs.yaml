openapi: 3.0.0
paths:
  /v1/files/upload/club-file/{clubId}:
    post:
      description: >-
        Uploads a generic file to a club's document storage. Supports optional
        title, description, and tags (e.g. required-for-club-registration).
        Creates a club event upon successful upload. Requires club data
        management permissions.
      operationId: uploadClubGenericFile
      parameters:
        - name: clubId
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload
                title:
                  type: string
                  nullable: true
                  example: Dokument
                description:
                  type: string
                  nullable: true
                  example: Zusätzliche Informationen zum Dokument
                tags:
                  type: array
                  items:
                    type: string
                  nullable: true
                  example: []
      responses:
        '201':
          description: ''
        4XX:
          description: >-
            400 (Bad Request - Check your payload), 401 (Unauthorized - Check
            your API key), 403 (Forbidden - Check your permissions), 404 (Not
            Found - Check the URL), 429 (Too Many Requests - Rate limit
            exceeded)
        5XX:
          description: >-
            Something went wrong on our end. Please try again later or contact
            support if the issue persists.
      summary: Upload club file
      tags:
        - Clubs
